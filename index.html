<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Fascia — Programma Estivo 12 Settimane</title>
<meta name="theme-color" content="#0C120E">
<!-- App installabile sulla Home dell'iPhone (schermo intero) -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fascia">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0C120E; --panel:#141D16; --panel2:#1A2620; --chalk:#E9EFE6; --muted:#9AAA9E;
  --accent:#D6F740;
  --gym:#FF9F45; --campo:#5FD68A; --strada:#6BC7F2; --rest:#8B93A1;
  --f1:#5FD68A; --f2:#FF9F45; --f3:#FF6B6B; --f4:#D6F740; --f5:#6BC7F2;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
button,.tab,.tabs button,[onclick],[data-v],.recipe-h,.meal-h,.dhead,.nday{touch-action:manipulation;cursor:pointer}
body{background:var(--bg);color:var(--chalk);font-family:'Archivo',system-ui,sans-serif;min-height:100vh;
  -webkit-overflow-scrolling:touch;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%, rgba(214,247,64,.06), transparent)}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 90px}
h1,h2,h3,.disp{font-family:'Anton',sans-serif;font-weight:400;letter-spacing:.02em;text-transform:uppercase}
header{padding:8px 0 18px}
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
h1{font-size:clamp(30px,7vw,44px);line-height:1.02}
h1 .out{color:transparent;-webkit-text-stroke:1.2px var(--chalk)}
.sub{color:var(--muted);font-size:14px;margin-top:8px;max-width:56ch}
.countdown{display:inline-flex;gap:8px;align-items:baseline;margin-top:14px;background:var(--panel);border:1px solid #243329;border-radius:99px;padding:8px 16px}
.countdown b{font-family:'Anton';font-size:22px;color:var(--accent)}
.countdown span{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* touchline — barra di stagione */
.touchline{margin:22px 0 6px}
.tl-bar{display:flex;height:14px;border-radius:99px;overflow:hidden;border:1px solid #2A3A2F;position:relative}
.tl-seg{flex:1;position:relative;cursor:pointer;opacity:.45;transition:opacity .2s}
.tl-seg.active,.tl-seg:hover{opacity:1}
.tl-seg.current::after{content:"";position:absolute;inset:0;outline:2px solid var(--chalk);outline-offset:-2px;border-radius:2px}
.tl-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:.06em;text-transform:uppercase}
.tl-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.tl-legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px}
.dotc{width:8px;height:8px;border-radius:50%;display:inline-block}

/* tabs */
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:rgba(12,18,14,.92);backdrop-filter:blur(10px);
  border-top:1px solid #243329;display:flex;z-index:50}
nav.tabs button{flex:1;background:none;border:none;color:var(--muted);font-family:'Archivo';font-weight:600;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:13px 4px 15px;cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center}
nav.tabs button .ic{font-size:18px;line-height:1}
nav.tabs button.on{color:var(--accent)}
nav.tabs button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}

.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* week nav */
.wknav{display:flex;align-items:center;gap:10px;margin:16px 0 4px}
.wknav button{background:var(--panel);border:1px solid #2A3A2F;color:var(--chalk);width:40px;height:40px;border-radius:10px;font-size:18px;cursor:pointer}
.wknav button:hover{border-color:var(--accent)}
.wknav .wktitle{flex:1;text-align:center}
.wknav .wktitle .disp{font-size:24px}
.phasechip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:4px 12px;border-radius:99px;margin-top:4px;color:#0C120E}
.phasedesc{font-size:13px;color:var(--muted);text-align:center;margin:10px auto 18px;max-width:60ch;line-height:1.5}

/* day card */
.day{background:var(--panel);border:1px solid #243329;border-radius:var(--radius);margin-bottom:14px;overflow:hidden;border-left:4px solid var(--rest)}
.day.gym{border-left-color:var(--gym)} .day.campo{border-left-color:var(--campo)}
.day.strada{border-left-color:var(--strada)} .day.rest{border-left-color:var(--rest)}
.day.today-glow{box-shadow:0 0 0 1px var(--accent), 0 0 24px rgba(214,247,64,.12)}
.dhead{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.dhead:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.dow{font-family:'Anton';font-size:20px;width:46px}
.dmeta{flex:1;min-width:0}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.badge{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:99px;color:#0C120E}
.b-gym{background:var(--gym)} .b-campo{background:var(--campo)} .b-strada{background:var(--strada)} .b-rest{background:var(--rest)}
.b-slot{background:var(--panel2);color:var(--muted);border:1px solid #2A3A2F}
.b-alto{background:#E8743B;color:#fff} .b-basso{background:#3B6FE8;color:#fff} .b-libero{background:#7A5FD6;color:#fff}

/* nutrizione */
.ntop{margin-top:16px}
.ndays{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.nday{flex:1;min-width:44px;background:var(--panel);border:1px solid #2A3A2F;color:var(--muted);border-radius:10px;padding:9px 4px;font-family:'Archivo';font-weight:700;font-size:12px;cursor:pointer}
.nday.on{background:var(--accent);border-color:var(--accent);color:#0C120E}
.suppl{background:var(--panel);border:1px solid #243329;border-left:3px solid var(--accent);border-radius:12px;padding:14px 16px;margin-bottom:14px}
.suppl-h{font-weight:700;font-size:14px;margin-bottom:10px}
.suppl-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #1E2B23;font-size:13px;align-items:baseline}
.suppl-row:last-child{border:none}
.suppl-row.sport .suppl-t{color:var(--accent)}
.suppl-t{min-width:140px;font-weight:600;color:var(--muted);font-size:12px}
.suppl-q{flex:1;color:var(--chalk)}
.meal{background:var(--panel);border:1px solid #243329;border-radius:12px;margin-bottom:10px;overflow:hidden}
.meal-h{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.meal-h:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.meal-name{font-weight:700;font-size:14.5px}
.meal .chev{transition:transform .2s}
.meal.open .chev{transform:rotate(180deg)}
.meal-b{display:none;padding:0 16px 14px;border-top:1px dashed #2A3A2F}
.meal.open .meal-b{display:block}
.cat{padding:11px 0;border-bottom:1px solid #1E2B23}
.cat:last-child{border:none}
.cat-n{font-weight:700;font-size:13px;color:var(--accent);margin-bottom:6px}
.cat-l{list-style:none;padding:0;display:flex;flex-direction:column;gap:3px}
.cat-l li{font-size:13px;color:var(--chalk);padding-left:14px;position:relative;line-height:1.4}
.cat-l li::before{content:"◦";position:absolute;left:0;color:var(--muted)}

/* ricette */
.meal-tag{font-size:9px;background:var(--accent);color:#0C120E;padding:2px 7px;border-radius:99px;font-weight:700;letter-spacing:.05em;vertical-align:middle;margin-left:4px}
.recipes{margin-top:14px;border-top:2px solid #2A3A2F;padding-top:14px}
.recipes-h{font-weight:700;font-size:13.5px;margin-bottom:4px}
.recipes-sub{display:block;font-weight:400;font-size:11.5px;color:var(--muted);margin-top:2px}
.recipe{background:var(--bg);border:1px solid #243329;border-radius:12px;padding:13px 14px;margin-top:10px}
.recipe.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.recipe-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.recipe-name{font-weight:700;font-size:14.5px;cursor:pointer;flex:1;line-height:1.3}
.recipe-name::after{content:" ▾";color:var(--muted);font-size:11px}
.rpick{background:var(--panel2);border:1.5px solid #36493D;color:var(--muted);border-radius:99px;font-size:11px;font-weight:700;padding:6px 12px;cursor:pointer;white-space:nowrap}
.rpick.on{background:var(--accent);border-color:var(--accent);color:#0C120E}
.recipe-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.rbadge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.02em}
.rbadge.new{background:#1f3a24;color:#5FD68A;border:1px solid #2E5A38}
.rbadge.mix{background:#3a3320;color:#E8C45F;border:1px solid #5a4f2e}
.rbadge.rep{background:#3a2420;color:#E8865F;border:1px solid #5a392e}
.rbadge.time{background:var(--panel2);color:var(--muted);border:1px solid #2A3A2F}
.recipe-intro{font-size:12.5px;color:var(--muted);margin-top:8px;line-height:1.45}
.recipe-detail{display:none;margin-top:10px;border-top:1px dashed #2A3A2F;padding-top:10px}
.recipe.expanded .recipe-detail{display:block}
.recipe.expanded .recipe-name::after{content:" ▴"}
.rd-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin:12px 0 6px}
.rd-h:first-child{margin-top:0}
.rd-ing{display:flex;flex-wrap:wrap;gap:5px}
.ingchip{font-size:11px;background:var(--panel2);border:1px solid #2A3A2F;color:var(--chalk);padding:3px 9px;border-radius:99px;text-transform:capitalize}
.ingchip.usedchip{opacity:.5;text-decoration:line-through}
.rd-steps{padding-left:20px;display:flex;flex-direction:column;gap:7px}
.rd-steps li{font-size:13px;line-height:1.5;color:var(--chalk)}
.rd-pronto{background:#16241a;border:1px solid #2E5A38;border-radius:9px;padding:9px 12px;font-size:12.5px;color:#cdebcf;margin:12px 0;line-height:1.45}
.rd-tip{background:var(--panel);border-left:3px solid var(--accent);border-radius:8px;padding:9px 12px;font-size:12.5px;color:var(--muted);margin-top:10px;line-height:1.45}
.rd-tip b,.rd-pronto b{color:var(--chalk)}
.resetbtn{width:100%;background:var(--panel);border:1px solid #2A3A2F;color:var(--muted);border-radius:10px;padding:11px;font-family:'Archivo';font-weight:600;font-size:12.5px;cursor:pointer;margin:6px 0 4px}
.resetbtn:hover{border-color:var(--accent);color:var(--accent)}
.focus{font-size:13px;color:var(--chalk);font-weight:600}
.dright{display:flex;align-items:center;gap:10px}
.donebtn{background:var(--panel2);border:1.5px solid #36493D;color:var(--muted);border-radius:99px;
  font-size:11px;font-weight:700;padding:7px 12px;cursor:pointer;letter-spacing:.05em;white-space:nowrap}
.donebtn.done{background:var(--accent);border-color:var(--accent);color:#0C120E}
.chev{color:var(--muted);transition:transform .2s;font-size:13px}
.day.open .chev{transform:rotate(180deg)}
.dbody{display:none;padding:0 16px 16px;border-top:1px dashed #2A3A2F}
.day.open .dbody{display:block}

/* exercise row */
.ex{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid #1E2B23;align-items:flex-start}
.ex:last-child{border:none}
.ex input[type=checkbox]{appearance:none;width:20px;height:20px;min-width:20px;border:2px solid #3A4D41;border-radius:6px;cursor:pointer;margin-top:2px;position:relative}
.ex input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.ex input[type=checkbox]:checked::after{content:"✓";color:#0C120E;font-weight:900;font-size:13px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.ex input[type=checkbox]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.exinfo{flex:1;min-width:0}
.exname{font-weight:700;font-size:14.5px}
.exname.checked{text-decoration:line-through;color:var(--muted)}
.exscheme{font-size:13px;color:var(--accent);font-weight:600;margin-top:2px;font-variant-numeric:tabular-nums}
.exdesc{font-size:12.5px;color:var(--muted);margin-top:4px;line-height:1.45}
.vbtn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:var(--panel2);border:1px solid #2F4036;
  color:var(--chalk);font-size:11.5px;font-weight:700;padding:6px 12px;border-radius:99px;text-decoration:none;letter-spacing:.04em}
.vbtn:hover{border-color:var(--accent);color:var(--accent)}
.vbtn .play{color:#FF6B6B}

/* oggi */
.todaybox{background:linear-gradient(160deg,var(--panel) 0%, var(--panel2) 100%);border:1px solid #2A3A2F;border-radius:18px;padding:20px;margin-top:16px}
.todaybox .bigday{font-size:clamp(26px,6vw,36px);margin:6px 0 2px}
.tstats{display:flex;gap:16px;margin:18px 0 6px;flex-wrap:wrap}
.tstat{background:var(--bg);border:1px solid #243329;border-radius:12px;padding:12px 16px;flex:1;min-width:100px;text-align:center}
.tstat b{font-family:'Anton';font-size:24px;display:block;color:var(--accent)}
.tstat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em}
.note{background:var(--panel);border:1px solid #243329;border-left:3px solid var(--accent);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--muted);margin:14px 0;line-height:1.5}
.note b{color:var(--chalk)}

/* glossario */
.gsearch{width:100%;background:var(--panel);border:1px solid #2A3A2F;color:var(--chalk);border-radius:12px;
  padding:13px 16px;font-size:14px;font-family:'Archivo';margin:16px 0}
.gsearch:focus{outline:2px solid var(--accent);border-color:transparent}
.gcat{margin:22px 0 8px;color:var(--accent);font-size:14px;letter-spacing:.12em}
.gitem{background:var(--panel);border:1px solid #243329;border-radius:12px;padding:14px 16px;margin-bottom:10px}

/* info */
.infoblock{background:var(--panel);border:1px solid #243329;border-radius:14px;padding:18px;margin-bottom:14px}
.infoblock h3{font-size:16px;color:var(--accent);margin-bottom:10px;letter-spacing:.06em}
.infoblock p,.infoblock li{font-size:13.5px;color:var(--muted);line-height:1.6}
.infoblock ul{padding-left:18px;margin-top:6px}
.infoblock b{color:var(--chalk)}

@media(max-width:480px){
  .dow{width:38px;font-size:17px}
  .tstats{gap:8px}
}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="eyebrow">Estate 2026 · Terzino / Ala / Quinto</div>
  <h1>Operazione <span class="out">Fascia</span></h1>
  <p class="sub">12 settimane · 6 giorni a settimana · palestra, campo e strada. Dal 15 giugno al precampionato di settembre, al picco di forma.</p>
  <div class="countdown"><b id="cd-num">—</b><span id="cd-lab">giorni al precampionato</span></div>

  <div class="touchline">
    <div class="tl-bar" id="tlbar" role="tablist" aria-label="Settimane"></div>
    <div class="tl-labels"><span>Sett. 1</span><span>15 giu → 6 set</span><span>Sett. 12</span></div>
    <div class="tl-legend">
      <span><i class="dotc" style="background:var(--f1)"></i>Adattamento</span>
      <span><i class="dotc" style="background:var(--f2)"></i>Forza max</span>
      <span><i class="dotc" style="background:var(--f3)"></i>Potenza</span>
      <span><i class="dotc" style="background:var(--f4)"></i>Velocità</span>
      <span><i class="dotc" style="background:var(--f5)"></i>Scarico</span>
    </div>
  </div>
</header>

<main>
  <section id="view-oggi" class="view on"></section>
  <section id="view-sett" class="view">
    <div class="wknav">
      <button id="wprev" aria-label="Settimana precedente">‹</button>
      <div class="wktitle"><div class="disp" id="wktitle">Settimana 1</div><span class="phasechip" id="wkphase"></span></div>
      <button id="wnext" aria-label="Settimana successiva">›</button>
    </div>
    <p class="phasedesc" id="wkdesc"></p>
    <div id="weekdays"></div>
  </section>
  <section id="view-nutri" class="view"></section>
  <section id="view-gloss" class="view">
    <input class="gsearch" id="gsearch" type="search" placeholder="Cerca un esercizio…" aria-label="Cerca esercizio">
    <div id="glist"></div>
  </section>
  <section id="view-info" class="view"></section>
</main>
</div>

<nav class="tabs">
  <button data-v="oggi" class="on"><span class="ic">⚽</span>Oggi</button>
  <button data-v="sett"><span class="ic">📅</span>Settimane</button>
  <button data-v="nutri"><span class="ic">🥗</span>Nutrizione</button>
  <button data-v="gloss"><span class="ic">🎬</span>Esercizi</button>
  <button data-v="info"><span class="ic">🧠</span>Guida</button>
</nav>

<script>
/* ============ DATI: ESERCIZI ============ */
const EX = {
  // Riscaldamento / recupero
  fifa:{n:"FIFA 11+ (riscaldamento)",c:"risc",d:"Riscaldamento preventivo completo (~15'): corsa lenta, forza/equilibrio, pliometria leggera, cambi di direzione. Riduce gli infortuni del ~30%. Da fare prima di OGNI sessione campo.",v:"https://www.youtube.com/watch?v=RSJIp7e7fyY"},
  warmup:{n:"Riscaldamento dinamico",c:"risc",d:"10' di mobilità dinamica: circonduzioni, affondi dinamici, leg swing, attivazione glutei e core. Prima di ogni sessione palestra.",v:"https://www.youtube.com/watch?v=ZCNWcOzjhXQ"},
  foam:{n:"Foam rolling",c:"risc",d:"Automassaggio con rullo: quadricipiti, femorali, polpacci, glutei, bandelletta. 30-60s per zona, lento, respirando.",v:"https://www.youtube.com/watch?v=Hu-rVZVSzxs"},
  stretch:{n:"Stretching / mobilità",c:"risc",d:"Allungamento statico a fine sessione: femorali, quadricipiti, adduttori, polpacci, flessori dell'anca. 30s per posizione.",v:"https://www.youtube.com/watch?v=yOxDeD4sPcE"},
  // Palestra
  squat:{n:"Squat con bilanciere",c:"gym",d:"Bilanciere sulla schiena, piedi larghezza spalle, scendi controllato fino a coscia parallela tenendo la schiena neutra, spingi forte coi talloni.",v:"https://www.youtube.com/watch?v=8PMjqgR8Wa8"},
  rdl:{n:"Stacco rumeno (RDL)",c:"gym",d:"Bilanciere davanti alle cosce, ginocchia leggermente flesse, spingi il bacino indietro scendendo lungo le gambe: senti tirare i femorali, poi risali contraendo i glutei.",v:"https://www.youtube.com/watch?v=uhghy9pFIPY"},
  hip:{n:"Hip thrust",c:"gym",d:"Schiena appoggiata alla panca, bilanciere sul bacino: spingi le anche verso l'alto fino alla linea spalle-ginocchia, strizza i glutei in alto 1s.",v:"https://www.youtube.com/watch?v=hCm-70-9_XE"},
  bulg:{n:"Bulgarian split squat",c:"gym",d:"Piede posteriore su panca, scendi verticale col ginocchio anteriore sopra il piede. Lavoro su una gamba sola: fondamentale per chi sprinta.",v:"https://www.youtube.com/watch?v=VPhhE6bBzZE"},
  nordic:{n:"Nordic hamstring curl",c:"gym",d:"In ginocchio, caviglie bloccate (compagno o macchina): lasciati cadere in avanti FRENANDO coi femorali il più a lungo possibile. Riduce gli infortuni ai flessori del 51%. Non saltarlo mai.",v:"https://www.youtube.com/watch?v=_e9vFU9-tkc"},
  trap:{n:"Trap bar deadlift",c:"gym",d:"Stacco con barra esagonale: dentro la barra, schiena neutra, spingi il pavimento via con le gambe. Più sicuro per la schiena dello stacco classico.",v:"https://www.youtube.com/watch?v=WzvsIU9FW60"},
  trapjump:{n:"Trap bar jump",c:"gym",d:"Come il trap bar deadlift ma con carico leggero (30-40%) ed esplodendo in un salto. Atterra morbido. È il ponte tra forza e sprint.",v:"https://www.youtube.com/watch?v=I-Zm8g6kXIM"},

/* ============ FASI ============ */
const PHASES = [
 {name:"Adattamento + Base aerobica",color:"var(--f1)",weeks:[1,2,3],desc:"Ricondizioniamo tendini e muscoli con volumi alti e carichi medi (50-65%), costruiamo il motore aerobico e ritroviamo il tocco di palla. Niente fretta: questa fase protegge tutto il resto del programma."},
 {name:"Forza massimale",color:"var(--f2)",weeks:[4,5,6],desc:"Carichi alti (80-90%) e poche ripetizioni: costruiamo la forza che poi diventerà esplosività. Recuperi lunghi in palestra, corsa a ritmo medio-alto su strada."},
 {name:"Potenza ed esplosività",color:"var(--f3)",weeks:[7,8,9],desc:"Convertiamo la forza in potenza: alzate veloci, balzi, depth jump, sprint resistiti con elastico e HIIT 30-15. Ogni ripetizione alla massima velocità — qualità sopra quantità."},
 {name:"Velocità e specificità",color:"var(--f4)",weeks:[10,11],desc:"Velocità massima, agilità reattiva e gesti del ruolo ad alta intensità: 1v1, sovrapposizioni e cross sotto fatica. La forza va in mantenimento."},
 {name:"Scarico (tapering)",color:"var(--f5)",weeks:[12],desc:"Volume dimezzato, intensità mantenuta su poche ripetizioni esplosive: via la fatica, dentro la freschezza. Arrivi al raduno brillante e senza acciacchi."}
];
function phaseOf(w){return PHASES.find(p=>p.weeks.includes(w))}

/* ============ COSTRUZIONE DELLE 12 SETTIMANE ============ */
const SLOT_M="Mattina 6–8", SLOT_S="Sera 18–21", SLOT_DBL="Mattina + Sera";
/* Recuperi standard per gli esercizi di palestra, aggiunti automaticamente
   solo quando lo schema non specifica già un "rec". Basati su principi consolidati:
   forza pesante/potenza 2-3', accessori monoarticolari 60-90s, core/prevenzione 45-60s. */
const REST_BY_EX={
  // forza pesante e multiarticolari
  squat:"rec 2-3'", rdl:"rec 2-3'", trap:"rec 2-3'", press:"rec 2'", row:"rec 2'",
  // potenza / esplosivi / pliometria (recupero completo per la qualità)
  trapjump:"rec 2-3'", depth:"rec 2-3'", bound:"rec 2-3'", box:"rec 2'",
  // accessori monoarticolari
  hip:"rec 90s", bulg:"rec 90s", lunge:"rec 90s", jlunge:"rec 90s", calf:"rec 60s",
  // core / prevenzione infortuni
  nordic:"rec 60s", cph:"rec 45-60s", pallof:"rec 45s", plank:"rec 45s", core:"rec 45-60s tra i giri"
};
function it(ex,scheme){
  // se è un esercizio di palestra noto e lo schema non cita già un recupero, lo aggiungo
  if(REST_BY_EX[ex] && !/rec/i.test(scheme)){
    scheme = scheme + " · " + REST_BY_EX[ex];
  }
  return {ex,scheme};
}
function day(dow,slot,place,focus,items,carbo){return {dow,slot,place,focus,items,carbo:carbo||"basso"}}
const DOWS=["LUN","MAR","MER","GIO","VEN","SAB","DOM"];

/* Riallineamento alla dieta a cicli di carboidrati (Dott.ssa Mastro):
   LUN/MER/VEN = giorni ALTO carbo  -> sedute di FORZA/POTENZA in palestra (sera)
   MAR/GIO/SAB = giorni BASSO carbo -> corsa e campo (mattina), lavoro a intensità gestita
   MER = doppia seduta quando serve (campo mattina + palestra sera, sfrutta i 500g di carbo)
   DOM = libera (dieta) + riposo
   Il 5° campo "carbo" alimenta il badge ALTO/BASSO e la scheda Nutrizione. */
function buildWeek(w){
  // ---- FASE 1 (1-3): Adattamento + base aerobica
  if(w<=3){
    const sq=w===3?"4×12":"3×12", run1=[30,35,40][w-1], run2=[35,40,45][w-1],
          bmn=[15,18,20][w-1], crs=[20,25,25][w-1], lad=[4,5,6][w-1];
    return [
      day("LUN",SLOT_S,"gym","Forza gambe + core",[
        it("warmup","10'"), it("squat",sq+" @60% · rec 90s"), it("rdl",sq+" · rec 90s"),
        it("lunge","3×10 per gamba"), it("hip","3×15"), it("plank","3×40s"),
        it("pallof","3×10 per lato"), it("calf","3×20"), it("stretch","5'")
      ],"alto"),
      day("MAR",SLOT_M,"strada","Base aerobica",[
        it("z2",run1+"' ritmo facile"), it("foam","10' + mobilità")
      ],"basso"),
      day("MER",SLOT_M,"campo","Tecnica + piedi rapidi",[
        it("fifa","15'"), it("bm",bmn+"'"), it("cond","4 passaggi (dx e sx)"),
        it("muro","10' entrambi i piedi"), it("ladder",lad+" passaggi (1 step, laterale)"), it("stretch","5'")
      ],"alto"),
      day("GIO",SLOT_S,"gym","Total body + prevenzione",[
        it("warmup","10'"), it("trap",(w===3?"4×10":"3×10")), it("press","3×12"),
        it("bulg","3×10 per gamba"), it("nordic","3×5 eccentrico lento"),
        it("cph","3×20s per lato"), it("core","3 giri"), it("stretch","5'")
      ],"basso"),
      day("VEN",SLOT_S,"gym","Aerobico + allunghi → spostato a forza",[
        it("warmup","10'"), it("squat","3×10 @60%"), it("rdl","3×10"),
        it("hip","3×12"), it("nordic","3×5"), it("cph","3×20s per lato"), it("core","3 giri")
      ],"alto"),
      day("SAB",SLOT_M,"campo","Tecnica di ruolo + aerobico",[
        it("fifa","15'"), it("z2",run2+"' facile"), it("touch","10'"), it("v1","15' finte di base"),
        it("cross",crs+" per lato (dx e sx)"), it("stretch","5'")
      ],"basso"),
      day("DOM","Libera","rest","Riposo + dieta libera",[it("rest","Foam rolling + mobilità 20'")],"libero")
    ];
  }
  // ---- FASE 2 (4-6): Forza massimale
  if(w<=6){
    const sq=["4×5 @82%","5×4 @85%","4×3 @88-90%"][w-4],
          tempoMin=[25,28,30][w-4], boxS=["4×4","4×5","4×4"][w-4],
          shut=["6","8","8"][w-4];
    return [
      day("LUN",SLOT_S,"gym","Forza massimale gambe",[
        it("warmup","10'"), it("squat",sq+" · rec 3'"), it("rdl","4×6 · rec 2-3'"),
        it("bulg","3×6 per gamba"), it("hip","4×8"),
        it("box",boxS+" atterraggio controllato"), it("cph","3×25s per lato"), it("pallof","3×10")
      ],"alto"),
      day("MAR",SLOT_M,"strada","Tempo run",[
        it("tempo",tempoMin+"' ritmo medio-alto"), it("foam","10'")
      ],"basso"),
      day("MER",SLOT_DBL,"campo","Doppia: campo mattina + forza sera",[
        it("fifa","15' (mattina)"), it("bm","15'"), it("cond","6× veloce + cambio direzione"),
        it("ladder","6 passaggi (Ickey shuffle, in-out)"), it("overlap","20 cross per lato"),
        it("warmup","— SERA —"), it("trap",["4×5","4×4","4×3"][w-4]+" · rec 3'"), it("row","4×6"),
        it("lunge","3×8 per gamba"), it("nordic","3×6"), it("core","3 giri"), it("calf","4×12")
      ],"alto"),
      day("GIO",SLOT_M,"strada","Recupero attivo + fartlek leggero",[
        it("fartlek","25' (1' medio / 2' piano)"), it("foam","10'")
      ],"basso"),
      day("VEN",SLOT_S,"gym","Forza massimale total body",[
        it("warmup","10'"), it("squat",sq+" · rec 3'"), it("press","4×6"),
        it("hip","4×8"), it("nordic","3×6"),
        ...(w===6?[it("depth","3×4 da rialzo basso")]:[]), it("cph","3×25s per lato"), it("core","3 giri")
      ],"alto"),
      day("SAB",SLOT_M,"campo","1v1 + cambi di direzione",[
        it("fifa","15'"), it("v1","20' mosse + dribbling"),
        it("shuttle",shut+"× rec completo"), it("cross","20 per lato sotto pressione leggera"),
        it("sprint","4×15m")
      ],"basso"),
      day("DOM","Libera","rest","Riposo + dieta libera",[it("rest","Foam rolling + mobilità 20'")],"libero")
    ];
  }
  // ---- FASE 3 (7-9): Conversione in potenza/esplosività
  if(w<=9){
    const hiitReps=["12-16","16-18","18"][w-7], band=["6","8","8"][w-7],
          depthS=["4×4","5×4","5×4"][w-7], boundS=["4×20m","4×20m","5×20m"][w-7],
          sprintSat=["6×40m","6×40m","8×40m"][w-7];
    return [
      day("LUN",SLOT_S,"gym","Potenza gambe",[
        it("warmup","10'"), it("trapjump","5×3 esplosivi · rec 2-3'"),
        it("squat","3×4 @75% MASSIMA velocità"), it("hip","4×6 esplosivo"),
        it("depth",depthS+" contatto minimo"), it("cph","3×30s per lato"), it("core","3 giri")
      ],"alto"),
      day("MAR",SLOT_M,"strada","HIIT 30-15",[
        it("warmup","10' + 3 allunghi"), it("hiit",hiitReps+" ripetizioni"), it("foam","10'")
      ],"basso"),
      day("MER",SLOT_DBL,"campo","Doppia: reattività mattina + potenza sera",[
        it("fifa","15' (mattina)"), it("wall","3×10 per gamba"),
        it("bandsprint",band+"×15m"), it("react","6× a segnale visivo"),
        it("v1","20' attacco dello spazio"), it("cross","15 di prima per lato"),
        it("warmup","— SERA —"), it("trap","5×3 veloce · rec 2-3'"), it("jlunge","3×6"),
        it("bound",boundS), it("nordic","3×6"), it("calf","4×10 esplosivi"), it("core","3 giri")
      ],"alto"),
      day("GIO",SLOT_M,"strada","Recupero aerobico leggero",[
        it("z2","30' molto facile"), it("foam","10'")
      ],"basso"),
      day("VEN",SLOT_S,"gym","Potenza total body",[
        it("warmup","10'"), it("trapjump","5×3 esplosivi"), it("hip","4×6 esplosivo"),
        it("jlunge","3×6"), it("bound",boundS), it("nordic","3×6"), it("core","3 giri")
      ],"alto"),
      day("SAB",SLOT_M,"campo","Velocità max + finalizzazione",[
        it("fifa","15'"), it("sprint",sprintSat+" · rec 2-3' completo"),
        it("flying","6×20m lanciati"), it("v1","20' + cross e finalizzazione"),
        it("ttest","4× rec completo")
      ],"basso"),
      day("DOM","Libera","rest","Riposo + dieta libera",[it("rest","Foam rolling + mobilità 20'")],"libero")
    ];
  }
  // ---- FASE 4 (10-11): Velocità e specificità
  if(w<=11){
    const fly=w===10?"6×30m":"7×30m";
    return [
      day("LUN",SLOT_S,"gym","Forza in mantenimento (~45')",[
        it("warmup","10'"), it("squat","3×4 @80% veloce"), it("hip","3×6"),
        it("box","3×4"), it("nordic","2×6"), it("core","2 giri")
      ],"alto"),
      day("MAR",SLOT_M,"strada","Velocità massima",[
        it("warmup","12' + allunghi"), it("flying",fly+" lanciati · rec completo"),
        it("sprint","4×20m accelerazioni"), it("stretch","8'")
      ],"basso"),
      day("MER",SLOT_S,"campo","Reattività + ruolo (sera)",[
        it("fifa","15'"), it("react","8× a segnale"),
        it("v1","20' dominante dx e sx"), it("v1def","10'"), it("cross","20 per lato ad alta intensità")
      ],"alto"),
      day("GIO",SLOT_M,"strada","Sprint + cambi direzione",[
        it("warmup","10'"), it("sprint","5×40m max · rec completo"), it("shuttle","6×"), it("stretch","8'")
      ],"basso"),
      day("VEN",SLOT_S,"gym","Potenza leggera",[
        it("warmup","10'"), it("trapjump","4×3"), it("jlunge","3×5"),
        it("core","3 giri"), it("calf","3×12")
      ],"alto"),
      day("SAB",SLOT_M,"campo","Partita + situazioni di ruolo",[
        it("fifa","15'"), it("ssg","40' — sovrapposizioni, cross, 1v1 difensivo"), it("stretch","8'")
      ],"basso"),
      day("DOM","Libera","rest","Riposo + dieta libera",[it("rest","Foam rolling + mobilità 20'")],"libero")
    ];
  }
  // ---- FASE 5 (12): Scarico/tapering
  return [
    day("LUN",SLOT_S,"gym","Richiamo forza (~35')",[
      it("warmup","10'"), it("squat","2×3 @80% veloce"), it("hip","2×5"),
      it("box","2×3"), it("core","leggero, 2 giri")
    ],"alto"),
    day("MAR",SLOT_M,"strada","Corsa facile",[
      it("z2","25' molto facile"), it("strides","4 allunghi")
    ],"basso"),
    day("MER",SLOT_S,"campo","Tecnica + richiamo velocità (sera)",[
      it("fifa","15'"), it("bm","12'"), it("sprint","3-4×15m"), it("cross","10 per lato"), it("ladder","3 passaggi leggeri")

/* ============ DATE ============ */
const START=new Date(2026,5,15); // lunedì 15 giugno 2026
const PRESEASON=new Date(2026,8,7); // lunedì 7 settembre 2026
function todayPos(){
  const t=new Date(); t.setHours(0,0,0,0);
  const diff=Math.floor((t-START)/86400000);
  if(diff<0) return {state:"pre",days:-diff};
  if(diff>=84) return {state:"post"};
  return {state:"in",week:Math.floor(diff/7)+1,day:diff%7};
}

/* ============ PROGRESSI (storage) ============ */
/* SafeStore: usa localStorage quando disponibile, altrimenti tiene i dati in memoria
   per la sessione. NON lancia MAI eccezioni: così un errore di storage non può
   bloccare il resto del codice (era questo che "rompeva i tasti" su Safari/iPhone
   quando si apriva il file senza l'ambiente di anteprima). */
const SafeStore=(function(){
  let ls=null;
  try{ const t="__ft_test__"; window.localStorage.setItem(t,"1"); window.localStorage.removeItem(t); ls=window.localStorage; }
  catch(e){ ls=null; }
  const mem=new Map();
  return {
    get(key){ try{ if(ls) return ls.getItem(key); return mem.has(key)?mem.get(key):null; }catch(e){ return null; } },
    set(key,val){ try{ if(ls){ ls.setItem(key,val); return true; } mem.set(key,val); return true; }catch(e){ try{mem.set(key,val);}catch(_){} return false; } },
    backend: ls? "localStorage" : "memoria"
  };
})();
let PROG={days:{},ex:{},recipes:{}}; // recipes: {weekKey: {"lun-Pranzo":recipeId, ...}}
function loadProg(){
  try{ const raw=SafeStore.get("ft-progress"); if(raw) PROG=JSON.parse(raw); }catch(e){}
  if(!PROG.days)PROG.days={}; if(!PROG.ex)PROG.ex={}; if(!PROG.recipes)PROG.recipes={};
}
function saveProg(){
  try{ SafeStore.set("ft-progress",JSON.stringify(PROG)); }catch(e){}
}

function dayCard(wk,di,d,opts={}){
  const dkey=`${wk}-${di}`, done=!!PROG.days[dkey];
  const isToday=opts.today;
  return `<div class="day ${placeClass[d.place]} ${opts.open?"open":""} ${isToday?"today-glow":""}" data-day="${dkey}">

          ${d.carbo==="libero"?`<span class="badge b-libero">Dieta libera</span>`:""}

}

/* --- Touchline --- */
let curWeek=1;
function renderTouchline(){
  const pos=todayPos(), bar=$("#tlbar"); bar.innerHTML="";
  for(let w=1;w<=12;w++){
    const seg=document.createElement("div");
    seg.className="tl-seg"+(w===curWeek?" active":"")+((pos.state==="in"&&pos.week===w)?" current":"");
    seg.style.background=phaseOf(w).color;
    seg.title="Settimana "+w;
    seg.onclick=()=>{curWeek=w;showView("sett");renderWeek()};
    bar.appendChild(seg);
  }
}

/* --- Oggi --- */
function renderToday(){
  const pos=todayPos(), v=$("#view-oggi");
  const doneDays=Object.values(PROG.days).filter(Boolean).length;
  const t=new Date();
  const cdDays=Math.max(0,Math.ceil((PRESEASON-t)/86400000));
  $("#cd-num").textContent=cdDays; 

  let html=`<div class="tstats">
    <div class="tstat"><b>${doneDays}</b><span>sessioni fatte</span></div>
    <div class="tstat"><b>${pos.state==="in"?pos.week:(pos.state==="pre"?"—":"12")}</b><span>settimana</span></div>
    <div class="tstat"><b>${cdDays}</b><span>giorni al raduno</span></div>
  </div>`;

  if(pos.state==="pre"){
    html+=`<div class="todaybox">
      <div class="eyebrow">Pre-stagione personale</div>
      <div class="bigday disp">Si parte lunedì 15 giugno</div>
      <p class="sub">Mancano ${pos.days} giorni al via. Intanto: esplora il programma nella scheda Settimane, guarda i video degli esercizi che non conosci e fai un giro di prova in palestra per stimare i tuoi carichi.</p>
    </div>
    <div class="note"><b>Consiglio:</b> nella prima settimana fai anche un piccolo test di partenza (sprint 30m cronometrato + salto verticale + corsa 30-15 se possibile). Ripetilo a fine settimana 6 e a fine programma per vedere i progressi.</div>`;
  } else if(pos.state==="post"){
    html+=`<div class="todaybox">
      <div class="bigday disp">Programma completato 🏆</div>
      <p class="sub">12 settimane archiviate. Ora testa tutto in campo: buon precampionato!</p>
    </div>`;

    const d=WEEKS[pos.week-1][pos.day], ph=phaseOf(pos.week);
    html+=`<div class="todaybox">
      <div class="eyebrow">Settimana ${pos.week} · <span style="color:${ph.color}">${ph.name}</span></div>
      <div class="bigday disp">${["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"][pos.day]} — ${d.focus}</div>

    ${dayCard(pos.week,pos.day,d,{open:true,today:true})}

/* --- Settimane --- */
function renderWeek(){
  const ph=phaseOf(curWeek), pos=todayPos();
  $("#wktitle").textContent="Settimana "+curWeek;
  const chip=$("#wkphase"); chip.textContent=ph.name; chip.style.background=ph.color;
  $("#wkdesc").textContent=ph.desc;
  $("#weekdays").innerHTML=WEEKS[curWeek-1].map((d,di)=>dayCard(curWeek,di,d,{today:pos.state==="in"&&pos.week===curWeek&&pos.day===di})).join("");
  renderTouchline();
  bindDayEvents($("#weekdays"));
}

  const f=filter.toLowerCase(), out=[];

    intro:"Piatto leggero con piselli. (Uovo solo se rientra nelle quantità del giorno.)",

    pronto:"I piselli sono pronti quando sono teneri e l'acqua si è ritirata.",
    varianti:["Menta fresca (classica coi piselli)","Peperoncino","Scorza di limone"],

];

/* indicizzazione e helper varietà */
function recipesFor(dayKey, pasto){ return RICETTE.filter(r=>r.g===dayKey && r.pasto===pasto); }

// chiave settimana corrente (per isolare le scelte settimana per settimana)
function weekKeyNow(){ const p=todayPos(); return p.state==="in" ? ("w"+p.week) : "w0"; }
// ordine cronologico dei pasti nella settimana, per sapere cosa viene "prima"
const MEAL_ORDER=[];
["lun","mar","mer","gio","ven","sab"].forEach(g=>{MEAL_ORDER.push(g+"-Pranzo");MEAL_ORDER.push(g+"-Cena");});
// ingredienti già usati nelle ricette scelte PRIMA di un certo pasto, nella settimana corrente
function usedIngredientsBefore(slotKey){
  const wk=weekKeyNow(); const chosen=(PROG.recipes&&PROG.recipes[wk])||{};
  const limit=MEAL_ORDER.indexOf(slotKey);
  const used=new Set();
  MEAL_ORDER.forEach((mk,i)=>{
    if(i>=limit) return; // solo i pasti precedenti
    const rid=chosen[mk]; if(!rid) return;
    const r=RICETTE.find(x=>x.id===rid); if(!r) return;
    r.ing.forEach(ig=>used.add(ig));
  });
  return used;
}
// quanti ingredienti "nuovi" porta una ricetta rispetto a quelli già usati
function noveltyScore(recipe, usedSet){
  let nuovi=0; recipe.ing.forEach(ig=>{ if(!usedSet.has(ig)) nuovi++; });
  return {nuovi, tot:recipe.ing.length, ripetuti:recipe.ing.length-nuovi};
}
// ricetta scelta per un dato slot nella settimana corrente
function chosenRecipe(slotKey){ const wk=weekKeyNow(); return (PROG.recipes&&PROG.recipes[wk]&&PROG.recipes[wk][slotKey])||null; }
function setChosenRecipe(slotKey, rid){
  const wk=weekKeyNow(); if(!PROG.recipes)PROG.recipes={}; if(!PROG.recipes[wk])PROG.recipes[wk]={};
  if(PROG.recipes[wk][slotKey]===rid) delete PROG.recipes[wk][slotKey]; // toggle: ri-tap deseleziona
  else PROG.recipes[wk][slotKey]=rid;
  saveProg();
}
function resetWeekRecipes(){ const wk=weekKeyNow(); if(PROG.recipes)PROG.recipes[wk]={}; saveProg(); }


/* --- Nutrizione --- */
const DOWKEY=["lun","mar","mer","gio","ven","sab","dom"];
function carboOfToday(){
  const pos=todayPos();
  if(pos.state!=="in") return null;
  return WEEKS[pos.week-1][pos.day].carbo;
}
function renderNutri(){
  renderNutriDay(NUTRI_SEL);
}
let NUTRI_SEL=null; // chiave giorno selezionata (null = oggi/default)
function renderNutriDay(sel){
  const pos=todayPos();
  const todayKey = pos.state==="in" ? DOWKEY[pos.day] : null;
  const key = sel || todayKey || "lun";
  NUTRI_SEL=key;
  const d=DIETA[key], macro=MACRO[key], kcal=KCAL[key];
  const carbo = (key==="dom")?"libero":(["lun","mer","ven"].includes(key)?"alto":"basso");
  // selettore giorni
  const giorni=[["lun","Lun"],["mar","Mar"],["mer","Mer"],["gio","Gio"],["ven","Ven"],["sab","Sab"],["dom","Dom"]];
  const chips=giorni.map(([k,lab])=>`<button class="nday ${k===key?"on":""}" data-nday="${k}">${lab}</button>`).join("");
  const carboBadge = carbo==="alto"?`<span class="badge b-alto">Carbo ALTO</span>`
                   : carbo==="basso"?`<span class="badge b-basso">Carbo BASSO</span>`
                   : `<span class="badge b-libero">Dieta libera</span>`;

  // integratori del giorno: sport in base alla sessione di allenamento di quel giorno (se in programma)
  let sport=[];
  if(pos.state==="in"){ const dd=WEEKS[pos.week-1][DOWKEY.indexOf(key)]; if(dd) sport=sufForPlace(dd.place); }
  else { sport = (carbo==="alto")?SUPPL_PESI:(key==="dom"?[]:SUPPL_CORSA); }

  let html=`
  <div class="ntop">
    <div class="ndays">${chips}</div>
    <div class="nhead">
      <div class="disp" style="font-size:24px">${d.titolo}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${carboBadge}
        ${key!=="dom"?`<span class="badge b-slot">${kcal} kcal</span><span class="badge b-slot">P ${macro[0]} · C ${macro[1]} · G ${macro[2]} g</span>`:""}</div>
    </div>
  </div>
  <div class="note" style="margin-top:14px"><b>Piano della Dott.ssa Federica Mastro</b> (visita 07/05/2026). Visualizzazione in sola lettura: di ogni categoria scegli <b>un solo alimento</b>, alternandoli. Ogni modifica va concordata con la nutrizionista.</div>`;

  if(key==="dom"){
    html+=`<div class="infoblock"><h3>Domenica</h3><p>Giorno a <b>dieta libera</b>. Nessun allenamento in programma: riposo.</p></div>`;
  } else {
    // integratori
    if(sport.length||SUPPL_BASE.length){
      html+=`<div class="suppl"><div class="suppl-h">💊 Integratori del giorno</div>`;
      SUPPL_BASE.forEach(s=>{html+=`<div class="suppl-row"><span class="suppl-t">${s.t}</span><span class="suppl-q">${s.q}</span></div>`;});
      sport.forEach(s=>{html+=`<div class="suppl-row sport"><span class="suppl-t">${s.t}</span><span class="suppl-q">${s.q}</span></div>`;});
      html+=`</div>`;
    }
    // pasti
    d.pasti.forEach((p,pi)=>{
      const isMain = (p.slot==="Pranzo"||p.slot==="Cena");
      const open = pi===0;
      const slotKey = key+"-"+p.slot;
      html+=`<div class="meal ${open?"open":""}" data-meal="${pi}">
        <div class="meal-h" tabindex="0" role="button"><span class="meal-name">${p.slot}${isMain?' <span class="meal-tag">ricette</span>':''}</span><span class="chev">▼</span></div>
        <div class="meal-b">`;
      // categorie alimenti del piano
      p.cats.forEach(c=>{
        html+=`<div class="cat"><div class="cat-n">${c.nome}</div><ul class="cat-l">`;
        c.voci.forEach(v=>{html+=`<li>${v}</li>`;});
        html+=`</ul></div>`;
      });
      // ricette (solo pranzo e cena)
      if(isMain){
        const recs=recipesFor(key,p.slot);
        if(recs.length){
          const used=usedIngredientsBefore(slotKey);
          const sel=chosenRecipe(slotKey);
          // ordina per novità (più ingredienti nuovi prima) per spingere la varietà
          const ranked=recs.map(r=>({r,s:noveltyScore(r,used)})).sort((a,b)=>b.s.nuovi-a.s.nuovi);
          html+=`<div class="recipes"><div class="recipes-h">🍴 Ricette proposte <span class="recipes-sub">scegline una; le proposte successive eviteranno gli ingredienti già usati</span></div>`;
          ranked.forEach(({r,s})=>{
            const isSel = sel===r.id;
            const allNew = s.ripetuti===0;
            const badge = allNew
              ? `<span class="rbadge new">✨ Tutti nuovi</span>`
              : (s.nuovi>0 ? `<span class="rbadge mix">${s.nuovi} nuovi · ${s.ripetuti} ripetuti</span>` : `<span class="rbadge rep">Ingredienti già usati</span>`);
            html+=`<div class="recipe ${isSel?'sel':''}" data-rid="${r.id}" data-slot="${slotKey}">
              <div class="recipe-top">
                <div class="recipe-name">${r.nome}</div>
                <button class="rpick ${isSel?'on':''}" data-pick="${r.id}" data-slot="${slotKey}">${isSel?'✓ Scelta':'Scegli'}</button>
              </div>
              <div class="recipe-badges">${badge}<span class="rbadge time">⏱ ${r.prep} · 🔥 ${r.cott}</span></div>
              <div class="recipe-intro">${r.intro}</div>
              <div class="recipe-detail">
                <div class="rd-h">Ingredienti principali</div><div class="rd-ing">${r.ing.map(i=>`<span class="ingchip ${used.has(i)?'usedchip':''}">${i.replace(/-/g,' ')}</span>`).join('')}</div>
                <div class="rd-h">Preparazione</div><ol class="rd-steps">${r.step.map(st=>`<li>${st}</li>`).join('')}</ol>
                <div class="rd-pronto">✅ <b>Pronto quando:</b> ${r.pronto}</div>
                <div class="rd-h">Varianti di condimento</div><ul class="cat-l">${r.varianti.map(v=>`<li>${v}</li>`).join('')}</ul>
                <div class="rd-tip">💡 <b>Consiglio:</b> ${r.tip}</div>
              </div>
            </div>`;
          });
          html+=`</div>`;
        }
      }
      html+=`</div></div>`;
    });
    // reset varietà settimana
    html+=`<button class="resetbtn" id="resetRecipes">↺ Azzera le scelte ricette di questa settimana</button>`;
  }
  // regole + sostituzioni
  html+=`<div class="meal" data-meal="rules"><div class="meal-h" tabindex="0" role="button"><span class="meal-name">📋 Regole generali</span><span class="chev">▼</span></div><div class="meal-b"><ul class="cat-l">${REGOLE_GEN.map(r=>`<li>${r}</li>`).join("")}</ul></div></div>`;
  html+=`<div class="meal" data-meal="subs"><div class="meal-h" tabindex="0" role="button"><span class="meal-name">🔄 Tabella sostituzioni</span><span class="chev">▼</span></div><div class="meal-b">${SOSTITUZIONI.map(s=>`<div class="cat"><div class="cat-n">${s.g}</div><div class="exdesc" style="color:var(--muted)">${s.r}</div></div>`).join("")}</div></div>`;
  html+=`<div class="note" style="font-size:12px">Fonte: Piano Alimentare Personalizzato a cura della Dott.ssa Federica Mastro (Biologa Nutrizionista). I dati antropometrici e clinici della visita non sono riportati qui. Per qualsiasi modifica rivolgiti alla nutrizionista.</div>`;

  $("#view-nutri").innerHTML=html;
  // eventi
  $("#view-nutri").querySelectorAll(".nday").forEach(b=>b.addEventListener("click",()=>renderNutriDay(b.dataset.nday)));
  $("#view-nutri").querySelectorAll(".meal-h").forEach(h=>{
    const t=()=>h.closest(".meal").classList.toggle("open");
    h.addEventListener("click",t);
    h.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();t();}});
  });
  // espandi/chiudi dettaglio ricetta al tap sul nome
  $("#view-nutri").querySelectorAll(".recipe-name").forEach(n=>{
    n.addEventListener("click",e=>{e.stopPropagation(); n.closest(".recipe").classList.toggle("expanded");});
  });
  // scegli ricetta (aggiorna varietà a cascata)
  $("#view-nutri").querySelectorAll(".rpick").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();
      setChosenRecipe(b.dataset.slot, b.dataset.pick);
      renderNutriDay(key); // ricalcola i badge varietà
    });
  });
  // reset settimana
  const rb=$("#resetRecipes");
  if(rb) rb.addEventListener("click",()=>{ resetWeekRecipes(); renderNutriDay(key); });
}

/* ============ EVENTI ============ */
function bindDayEvents(root){
  root.querySelectorAll(".dhead").forEach(h=>{
    const toggle=e=>{
      if(e.target.closest(".donebtn"))return;
      const card=h.closest(".day"); card.classList.toggle("open");
      h.setAttribute("aria-expanded",card.classList.contains("open"));
    };
    h.addEventListener("click",toggle);
    h.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggle(e)}});
  });
  root.querySelectorAll(".donebtn").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      const k=b.dataset.daykey; PROG.days[k]=!PROG.days[k];
      b.classList.toggle("done",PROG.days[k]);
      b.textContent=PROG.days[k]?"✓ Fatto":"Segna fatto";
      await saveProg();
      if($("#view-oggi").classList.contains("on")) renderToday();
    });
  });
  root.querySelectorAll("input[data-exkey]").forEach(c=>{
    c.addEventListener("change",async ()=>{
      PROG.ex[c.dataset.exkey]=c.checked;
      c.closest(".ex").querySelector(".exname").classList.toggle("checked",c.checked);
      await saveProg();
    });
  });
}

function showView(name){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
  $("#view-"+name).classList.add("on");
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.v===name));
  window.scrollTo({top:0});
}
document.querySelectorAll("nav.tabs button").forEach(b=>b.addEventListener("click",()=>{
  showView(b.dataset.v);
  if(b.dataset.v==="sett")renderWeek();
  if(b.dataset.v==="nutri")renderNutri();
}));
$("#wprev").onclick=()=>{if(curWeek>1){curWeek--;renderWeek()}};
$("#wnext").onclick=()=>{if(curWeek<12){curWeek++;renderWeek()}};
$("#gsearch").addEventListener("input",e=>renderGloss(e.target.value));

  try{ if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("./sw.js").catch(()=>{}); }); } }catch(e){}
})();
